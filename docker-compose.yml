version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cep-postgres
    environment:
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
